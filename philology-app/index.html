<script>
    async function go() {
        const out = document.getElementById('response');
        const input = document.getElementById('inp').value;
        
        if (!input) {
            out.innerText = "Provide a word to dredge, or get out.";
            return;
        }

        out.innerText = "Dredging the silt...";
        
        try {
            // Path matches your GitHub file: api/analyze.js
            const res = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input })
            });

            if (!res.ok) throw new Error('Backend unresponsive.');

            const data = await res.json();
            
            // Typewriter effect for Babaji's response
            out.innerText = "";
            let i = 0;
            const text = data.analysis;
            
            function type() {
                if (i < text.length) {
                    out.innerText += text.charAt(i);
                    i++;
                    setTimeout(type, 30); // Speed of the "dredge"
                }
            }
            type();

        } catch (e) {
            out.innerText = "The connection is silted up. Try again.";
            console.error(e);
        }
    }
</script>
