<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Babaji: Philology</title>
    <style>
        body { background: #0b0b1a; color: #d4af37; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; margin: 0; }
        .cosmic-box { border: 2px solid #d4af37; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); max-width: 600px; margin: auto; }
        h1 { letter-spacing: 5px; text-shadow: 0 0 10px #d4af37; margin-top: 10px; margin-bottom: 2px; }
        .precision-tag { font-size: 0.7rem; letter-spacing: 2px; color: #888; margin-bottom: 25px; display: block; }
        
        .input-area { width: 90%; margin: auto; text-align: left; }
        label { font-size: 0.75rem; text-transform: uppercase; color: #d4af37; display: block; margin-bottom: 5px; }
        textarea { width: 100%; height: 120px; padding: 12px; border-radius: 5px; border: 1px solid #d4af37; background: #1a1a2e; color: white; font-size: 1rem; box-sizing: border-box; resize: none; outline: none; }
        
        button { background: #4b0082; color: white; padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-size: 1.1rem; width: 95%; margin-top: 20px; box-shadow: 0 0 15px #6a0dad; font-weight: bold; }
        
        #babaji-response { margin-top: 25px; font-style: italic; line-height: 1.6; color: #eee; padding: 15px; border-top: 1px dashed #444; text-align: left; white-space: pre-wrap; min-height: 100px; }
    </style>
</head>
<body>

    <div class="cosmic-box">
        <h1>ASK BABAJI</h1>
        <span class="precision-tag">DREDGING THE SILT OF LANGUAGE</span>
        
        <div class="input-area">
            <label>The Word or Phrase</label>
            <textarea id="userInput" placeholder="What words haunt you today?"></textarea>
        </div>
        
        <button onclick="getPhilology()">Analyze the Silt</button>

        <div id="babaji-response">Babaji is waiting to dismantle your vocabulary...</div>
    </div>

    <script>
        async function getPhilology() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('babaji-response');

            if (!input) {
                alert("Babaji cannot analyze silence.");
                return;
            }

            output.innerText = "Dredging the roots of your ignorance...";

            try {
                const response = await fetch('/api/philology', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: input })
                });
                
                const data = await response.json();
                
                if (data.analysis) {
                    let i = 0;
                    output.innerText = "";
                    function type() {
                        if (i < data.analysis.length) {
                            output.innerText += data.analysis.charAt(i);
                            i++;
                            setTimeout(type, 20);
                        }
                    }
                    type();
                } else {
                    output.innerText = "The silt is too thick. Try again.";
                }
            } catch (e) {
                output.innerText = "The connection to the stars is flickering.";
            }
        }
    </script>
</body>
</html>
