<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ask Babaji</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { background-color: #050505; color: #d4d4d4; font-family: 'Georgia', serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .terminal { background-color: #111; padding: 30px; border: 1px solid #d4af37; width: 100%; max-width: 500px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); border-radius: 8px; margin-top: 20px; box-sizing: border-box; }
        
        /* Prabu's Float Animation */
        @keyframes prabuFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .prabu-img { font-size: 55px; text-align: center; animation: prabuFloat 3s ease-in-out infinite; margin-bottom: 10px; cursor: pointer; }
        
        h1 { color: #d4af37; text-align: center; font-size: 1.8rem; letter-spacing: 4px; margin: 10px 0; text-transform: uppercase; }
        .subtitle { text-align: center; font-size: 0.75rem; color: #777; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        label { color: #d4af37; font-size: 0.7rem; text-transform: uppercase; margin-bottom: -5px; letter-spacing: 1px; }
        select, input { padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1rem; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        button { padding: 18px; background: #4b0082; border: 1px solid #d4af37; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; border-radius: 4px; letter-spacing: 1px; }
        button:hover { background: #d4af37; color: #000; }
        .prabu-btn { background: #222; border: 1px solid #444; font-size: 0.75rem; color: #999; margin-top: 10px; }

        #output { margin-top: 30px; line-height: 1.7; color: #eee; font-size: 1.05rem; border-top: 1px dashed #333; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="prabu-img" title="It's Prabu!">🪳🧢</div>
        <h1>ASK BABAJI</h1>
        <div class="subtitle">Dredging the Silt of Tradition</div>

        <div class="input-group">
            <label>Tradition</label>
            <select id="tradition">
                <option value="Buddhism (Nikaya & Mahayana)">Buddhism</option>
                <option value="Germanic/Norse Philology">Norse Philology</option>
                <option value="Ancient Egyptian (Hermetic)">Ancient Egyptian</option>
                <option value="Vedic/Upanishadic">Vedic</option>
                <option value="Hellenic (Pre-Socratic)">Hellenic</option>
                <option value="Slavic Philology">Slavic Philology</option>
            </select>

            <label>Root Language</label>
            <select id="language">
                <option value="English (Academic)">English</option>
                <option value="Sanskrit">Sanskrit</option>
                <option value="Old Norse">Old Norse</option>
                <option value="Ancient Egyptian">Ancient Egyptian</option>
                <option value="Pali">Pali</option>
                <option value="Russian">Russian</option>
            </select>

            <label>Term for Analysis</label>
            <input type="text" id="userInput" placeholder="Enter word...">
            
            <button onclick="generateWisdom()">Dredge the Roots</button>
            <button class="prabu-btn" onclick="prabuSuggests()">ASK PRABU FOR A QUESTION</button>
        </div>
        <div id="output">SYSTEM STATUS: READY.</div>
    </div>

    <script>
        function prabuSuggests() {
            const qs = ["Root of 'Sattva'?", "Etymology of 'Yggdrasil'?", "Egyptian 'Maat'?", "Slavic 'Vera'?"];
            document.getElementById('userInput').value = qs[Math.floor(Math.random() * qs.length)];
        }

        async function generateWisdom() {
            const word = document.getElementById('userInput').value;
            const tradition = document.getElementById('tradition').value;
            const lang = document.getElementById('language').value;
            const output = document.getElementById('output');
            if (!word) { alert("Please enter a term."); return; }
            output.innerHTML = "<span style='color:#d4af37'>Dredging the silt...</span>";

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word, tradition, lang })
                });
                const data = await response.json();
                const rawText = data.analysis || (data.candidates && data.candidates[0].content.parts[0].text);
                output.innerHTML = marked.parse(rawText || "No roots found in this layer.");
                MathJax.typeset();
            } catch (e) {
                output.innerHTML = "<span style='color:red'>Dredge Failure: Connection lost.</span>";
            }
        }
    </script>
</body>
</html>
