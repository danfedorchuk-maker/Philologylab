<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Philology Lab | Linguistic Research Terminal</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; justify-content: center; padding: 40px; }
        .container { max-width: 950px; width: 100%; text-align: center; border: 1px solid #2a2a2a; padding: 50px; background: #1a1a1a; box-shadow: 0 15px 45px rgba(0,0,0,0.8); border-radius: 4px; }
        h1 { color: #f58220; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; font-weight: 300; }
        .subtitle { color: #888; margin-bottom: 35px; font-size: 0.9rem; letter-spacing: 1px; }
        .input-group { margin: 30px 0; display: flex; flex-direction: column; gap: 15px; }
        select, input { padding: 16px; background: #252525; border: 1px solid #333; color: white; font-size: 1rem; border-radius: 2px; outline: none; transition: 0.2s; }
        select:focus, input:focus { border-color: #f58220; }
        button { padding: 18px; background: #f58220; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 2px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; margin-top: 5px; }
        button:hover { background: #ff9d4d; }
        #output { margin-top: 40px; text-align: left; line-height: 1.8; border-top: 1px solid #2a2a2a; padding-top: 40px; white-space: pre-wrap; font-size: 1.1rem; color: #ccc; }
        .footer-stats { margin-top: 60px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; border-top: 1px solid #2a2a2a; padding-top: 30px; }
        .stat-box { font-size: 0.8rem; color: #666; text-align: left; border-left: 2px solid #f58220; padding-left: 15px; }
        .stat-box b { color: #f58220; display: block; margin-bottom: 5px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>THE PHILOLOGY LAB</h1>
    <div class="subtitle">ADVANCED MULTILINGUAL EXEGESIS TERMINAL</div>
    
    <div class="input-group">
        <select id="tradition">
            <option value="Buddhism">Buddhism</option>
            <option value="Hinduism">Hinduism</option>
            <option value="Taoism">Taoism</option>
            <option value="Stoicism">Stoicism</option>
            <option value="Sufism">Sufism</option>
            <option value="Jainism">Jainism</option>
            <option value="Hellenic Tradition (Greek Polytheism)">Hellenic Tradition</option>
            <option value="Germanic/Norse Polytheism">Germanic/Norse Polytheism</option>
            <option value="Modern Wicca">Modern Wicca</option>
        </select>

        <select id="language">
            <option value="English">Output: English</option>
            <option value="Hindi">Output: Hindi (हिन्दी)</option>
            <option value="French">Output: French (Français)</option>
            <option value="German">Output: German (Deutsch)</option>
            <option value="Russian">Output: Russian (Русский)</option>
            <option value="Spanish">Output: Spanish (Español)</option>
            <option value="Pali">Output: Pali (Romanized)</option>
            <option value="Simplified Chinese">Output: Simplified Chinese (简体中文)</option>
            <option value="Traditional Chinese">Output: Traditional Chinese (繁體中文)</option>
            <option value="Sanskrit (Devanagari)">Output: Sanskrit (संस्कृतम्)</option>
            <option value="Tibetan (Uchen)">Output: Tibetan (བོད་སྐད)</option>
        </select>

        <input type="text" id="userInput" placeholder="Enter Philosophical or Theological Term...">
        <button onclick="generateWisdom()">EXECUTE SCHOLARLY ANALYSIS</button>
    </div>

    <div id="output"><i>Awaiting sequence initialization... Database ready for term exegesis.</i></div>

    <div class="footer-stats">
        <div class="stat-box"><b>LITURGICAL SCRIPTS</b>Sanskrit, Pali, Tibetan, Greek, Old Norse</div>
        <div class="stat-box"><b>ANALYSIS DEPTH</b>1,000 Word Technical Review</div>
        <div class="stat-box"><b>SOURCE PROTOCOL</b>Primary & Indigenous Citations (Non-Orientalist)</div>
    </div>
</div>

<script>
    async function generateWisdom() {
        const apiKey = "AIzaSyDA4MTDGUo5mWVP9UALR6Rbun8WWAg3CZw"; 
        
        const tradition = document.getElementById('tradition').value;
        const lang = document.getElementById('language').value;
        const word = document.getElementById('userInput').value;
        const output = document.getElementById('output');

        if (!word) return alert("Please specify a term.");
        output.innerHTML = "<b>Initializing Philological Scan in " + lang + "...</b>";

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;

        const prompt = `You are a world-class philologist. Perform a rigorous scholarly analysis of "${word}" within ${tradition}. 
        
        SOURCE RULES:
        - USE PRIMARY SOURCES ONLY (Vedas, Upanishads, Sutras, Agamas, Eddas, etc.).
        - USE INDIGENOUS COMMENTARIES (e.g., Shankara, Nagarjuna, Zhuangzi).
        - STRICTLY AVOID 19th-century colonial/Orientalist perspectives (e.g., DO NOT cite Max Müller or similar Victorian-era interpretations).
        
        REQUIRED STRUCTURE:
        1. Comprehensive response in ${lang} (approx 1,000 words).
        2. MANDATORY SCRIPTS: 
           - Dharmic: Sanskrit (Devanagari), Pali (Romanized), Tibetan (Uchen).
           - Hellenic: Ancient Greek (Polytonic).
           - Norse: Old Norse (Romanized) and Younger Futhark Runes.
           - Taoist: Traditional and Simplified Chinese.
        3. Neutral, academic, objective tone.`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content) {
                output.innerHTML = data.candidates[0].content.parts[0].text;
            } else {
                output.innerHTML = "<b>ANALYSIS ERROR:</b> " + (data.error ? data.error.message : "Check API Key.");
            }
        } catch (e) {
            output.innerHTML = "<b>HARDWARE EXCEPTION.</b> Check Console.";
        }
    }
</script>

</body>
</html>
