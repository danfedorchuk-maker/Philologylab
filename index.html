<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Philology Lab</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>

    <style>
        body { background-color: #0f0f0f; color: #d4d4d4; font-family: 'Georgia', serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .terminal { background-color: #1a1a1a; padding: 40px; border-radius: 4px; border: 1px solid #333; width: 100%; max-width: 900px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-top: 50px; box-sizing: border-box; }
        h1 { color: #d4af37; letter-spacing: 4px; text-align: center; margin-bottom: 5px; text-transform: uppercase; font-size: 2.5rem; }
        .subtitle { text-align: center; font-size: 0.8rem; color: #666; margin-bottom: 40px; letter-spacing: 2px; text-transform: uppercase; }
        .input-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        select, input { width: 100%; padding: 15px; background: #111; border: 1px solid #444; color: #fff; font-size: 1rem; box-sizing: border-box; font-family: 'Georgia', serif; }
        button { width: 100%; padding: 20px; margin-top: 20px; background-color: #d4af37; border: none; color: #000; font-weight: bold; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        button:hover { background-color: #b8962d; }
        #output { margin-top: 40px; line-height: 1.8; color: #ccc; border-top: 1px dashed #444; padding-top: 30px; font-size: 1.1rem; }
        /* Professional Text Formatting */
        #output h3 { color: #d4af37; margin-top: 30px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #output ul { padding-left: 25px; margin: 15px 0; }
        #output li { margin-bottom: 12px; }
        #output p { margin-bottom: 20px; }
    </style>
    <h1>THE PHILOLOGY LAB</h1>
    <p class="subtitle">ADVANCED MULTILINGUAL EXEGESIS TERMINAL</p>

    <select id="tradition">
        <option value="Buddhism">Buddhism (Nikaya & Mahayana)</option>
        <option value="Taoism">Taoism (Classical/Quanzhen)</option>
        <option value="Hinduism">Hinduism (Vedic/Vedanta)</option>
        <option value="Hellenic">Hellenic (Pre-Socratic/Platonic)</option>
        <option value="Norse">Norse (Old Norse/Eddic)</option>
        <option value="Sufism">Sufism (Islamic Mysticism)</option>
    </select>

    <select id="language">
        <option value="English">Output: English (Academic)</option>
        <option value="Russian">Output: Russian (Русский)</option>
        <option value="Traditional Chinese">Output: Traditional Chinese (繁體中文)</option>
        <option value="Sanskrit">Output: Sanskrit (Devanagari)</option>
        <option value="Ancient Greek">Output: Ancient Greek (Polytonic)</option>
        <option value="Pali">Output: Pali (Theravada)</option>
        <option value="Tibetan">Output: Tibetan (Uchen)</option>
        <option value="German">Output: German (Philological)</option>
        <option value="Latin">Output: Latin (Classical)</option>
    </select>

    <input type="text" id="userInput" placeholder="Enter Term (e.g., Shunyata, Logos, Qi)...">

    <button onclick="generateWisdom()">EXECUTE SCHOLARLY ANALYSIS</button>

    <div id="output">SYSTEM STATUS: ONLINE. Awaiting ontological input...</div>
</div>

<script>
    async function generateWisdom() {
        const word = document.getElementById('userInput').value;
        const tradition = document.getElementById('tradition').value;
        const lang = document.getElementById('language').value;
        const output = document.getElementById('output');

        if (!word) { alert("Input Required."); return; }

        output.innerHTML = "<i style='color:#d4af37'>Initializing philological scan...</i>";

        try {
            const response = await fetch('https://philologylab.com/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ word, tradition, lang })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content) {
              const rawText = data.candidates[0].content.parts[0].text;
            output.innerHTML = marked.parse(rawText);
            MathJax.typeset();
            } else if (data.error) {
                output.innerText = "API ERROR: " + data.error;
            } else {
                output.innerText = "SYSTEM ERROR: Check Vercel logs.";
            }
        } catch (err) {
            output.innerText = "CONNECTION FAILURE.";
        }
    }
</script>
</body>
</html>
